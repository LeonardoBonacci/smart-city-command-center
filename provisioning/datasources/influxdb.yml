apiVersion: 1

datasources:
  - name: InfluxDB
    uid: influxdb-smartcity
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: smartcity
      defaultBucket: sensors
    secureJsonData:
      token: changeme
    isDefault: true
    editable: true
